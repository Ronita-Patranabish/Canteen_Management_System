<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Database Connection Info</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
}

.box {
    width: 400px;
    margin: 80px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    color: #333;
}

p {
    font-size: 16px;
    margin: 10px 0;
}

span {
    color: #ff4d6d;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="box">
    <h2>DB Connection Info</h2>

    <p><span>Server:</span> localhost</p>
    <p><span>Username:</span> root</p>
    <p><span>Password:</span> (empty)</p>
    <p><span>Database:</span> canteen</p>

    <hr>

    <p>This represents backend database configuration used in PHP (db.php).</p>
    <p>Actual connection works only in XAMPP with MySQL.</p>
</div>

</body>
</html>
